[build]
# Switch to Dockerfile builder for better cache control
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.env]
# This argument changes with every push to force a fresh copy of model files
CACHEBUST = "REVISION_$(Get-Date -UFormat %Y%m%d_%H%M%S)"
NIXPACKS_NO_CACHE = "1"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthCheckPath = "/health"
healthCheckTimeout = 120
restartPolicyType = "ON_FAILURE"
