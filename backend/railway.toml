[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[build.env]
# FORCED CACHE INVALIDATION
# Each push generates a unique seed to bypass Docker's 'COPY' cache
CACHEBUST = "RICE_V2_SYNC_$(Get-Date -UFormat %Y%m%d_%H%M%S)"
# Additional build argument for Railway's builder
RAILWAY_DOCKER_BUILD_ARGS = "CACHEBUST=RICE_V2_SYNC_$(Get-Date -UFormat %Y%m%d_%H%M%S)"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthCheckPath = "/health"
healthCheckTimeout = 120
restartPolicyType = "ON_FAILURE"
