[build]
builder = "nixpacks"

[build.env]
NIXPACKS_NO_CACHE = "1"
PIP_NO_CACHE_DIR = "1"
PYTHON_VERSION = "3.10"
RANDOM_BUILD_SEED = "RICE_FUSION_V3_FINAL_2026_04_22"

[deploy]
startCommand = "uvicorn inference_server:app --host 0.0.0.0 --port $PORT"
healthCheckPath = "/health"
healthCheckTimeout = 120
restartPolicyType = "ON_FAILURE"
