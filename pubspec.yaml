name: plant_pulse
description: "PlantPulse — AI plant disease detection for Pakistani farmers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.5.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  camera: ^0.11.0+2
  path_provider: ^2.1.4
  google_fonts: ^8.0.2
  flutter_dotenv: ^5.1.0

  sqflite: ^2.3.0
  path: ^1.9.0
  uuid: ^4.3.3
  http: ^1.1.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/images/Without Background Logo.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    - assets/models/causal_rules.json